# =============================================================================
# Multi30k 다국어(en-de, en-fr) 번역을 위한 기본 설정 파일.
#
# 프로젝트 어디에서든 사용되는 모든 하이퍼파라미터가 여기 선언되어 있으며,
# config/config.py의 dataclass들과 1:1로 매핑된다. 커맨드라인에서
# --set section.key=value 로 어떤 값이든 오버라이드할 수 있다:
#   예)  python train.py --set model.d_model=512 --set training.epochs=10
#
# 실행 순서:
#   python preprocess.py   # BPE 학습/적용 + 어휘집 + id 변환
#   python train.py        # 학습 (+ best 체크포인트 저장)
#   python test.py         # 테스트 번역 + sacreBLEU
#   python translate.py --checkpoint checkpoints/best.pt --sentence "..."
# =============================================================================

model:
  vocab_size: 16000              # 공용 상한 (실제 크기는 어휘집 파일이 결정; 런타임 덮어쓰기)
  src_vocab_size: null           # 소스(en) 어휘집 크기 — train.py가 vocab.en 크기로 설정
  tgt_vocab_size: null           # 타겟(de) 어휘집 크기 — train.py가 vocab.de 크기로 설정
  max_seq_length: 128            # 지원하는 최대 시퀀스 길이 (BPE 토큰 기준)
  d_model: 128                   # residual-stream 폭
  n_heads: 4                     # 어텐션 헤드 수 (d_model을 나눠떨어뜨려야 함)
  num_encoder_layers: 4
  num_decoder_layers: 4
  dim_feedforward: 256           # FFN 은닉 폭 (보통 d_model의 4배)
  dropout: 0.1                   # feed-forward 네트워크 내부 dropout
  activation: relu               # relu | gelu | silu | tanh
  layer_norm_eps: 1.0e-5
  bias: true                     # FFN / 출력 프로젝션의 bias 항
  embedding_dropout: 0.1         # 토큰+위치 임베딩에 적용하는 dropout
  attention_dropout: 0.1         # 어텐션 확률 맵에 적용하는 dropout
  residual_dropout: 0.1          # residual 덧셈 전 서브레이어 출력에 적용하는 dropout
  norm_style: pre                # pre (Pre-LN) | post (Post-LN, 원 논문 방식)
  positional_encoding_type: sinusoidal   # sinusoidal | learned | none
  learned_position_embedding: false      # 레거시 플래그; true면 "learned"로 강제
  scale_embedding: true          # 임베딩에 sqrt(d_model)을 곱함
  share_embedding: false         # 언어별 분리 어휘집이므로 공유 불가
  share_decoder_embedding: true  # 디코더 입력 임베딩을 출력 프로젝션과 묶음(tie)
  tie_output_projection: true    # 최종 어휘 프로젝션을 디코더 임베딩과 묶음(tie)
  pad_token_id: 0                # 런타임에 어휘집 값으로 덮어써짐

attention:
  qkv_bias: true                 # Q/K/V 및 출력 프로젝션의 bias
  attention_scaling: true        # true -> 1/sqrt(d_head); false -> 없음; float -> 사용자 지정값
  mask_future: true              # 디코더 self-attention에서 causal 마스크 사용
  causal: false                  # 모든 어텐션 모듈 내부에서 causal 마스킹 강제
  attention_type: scaled_dot_product   # 레지스트리 키; 새 메커니즘은 여기에 추가
  store_attention: false         # 시각화를 위해 마지막 어텐션 맵 저장

optimization:
  optimizer: adamw               # adam | adamw | sgd
  learning_rate: 5.0e-4          # warm-up 이후의 최대(peak) 학습률
  weight_decay: 0.01
  betas: [0.9, 0.98]
  eps: 1.0e-9
  gradient_clip: 1.0             # 전역 노름 클리핑 (0이면 비활성화)
  scheduler: noam                # noam(=fairseq inverse_sqrt) | cosine | linear | constant
  warmup_steps: 2000
  min_lr: 1.0e-6                 # decay 스케줄의 학습률 하한
  cosine_decay: true             # false -> warm-up 이후 학습률 고정
  label_smoothing: 0.1

training:
  batch_size: 256
  epochs: 200
  seed: 42
  mixed_precision: false         # AMP (CUDA에서만 효과 있음)
  accumulation_steps: 1          # 그래디언트 누적 micro-batch 수
  num_workers: 4
  save_every: 1                  # N epoch마다 주기적으로 체크포인트 저장
  validate_every: 1              # N epoch마다 검증
  log_every: 50                  # N 옵티마이저 스텝마다 TensorBoard 로깅
  early_stopping_patience: 10     # 개선 없이 허용하는 검증 횟수 (0이면 비활성화)
  device: null                   # cuda | cuda:N | mps | cpu | null(자동 감지)
  valid_bleu: true               # 매 검증마다 greedy 생성으로 valid BLEU 로깅 (비싸면 false)

dataset:
  raw_dir: data/raw              # 원본 코퍼스 디렉터리 ({split}.{lang})
  bin_dir: data/data-bin         # 전처리 산출물 디렉터리 (쌍별 하위 디렉터리 생성)
  lang_pairs: [en-de, en-fr]     # preprocess.py가 전처리할 언어쌍 목록
  src_lang: en                   # 활성 쌍의 소스 언어 (train/test/translate가 사용)
  tgt_lang: de                   # 활성 쌍의 타겟 언어 (fr로 바꾸면 en-fr task)
  valid_split: val               # 학습 중 검증에 사용할 split
  test_split: test2016           # train.py 학습 후 teacher-forced 사후 확인용 split
  lowercase: true                # preprocess.py / translate.py가 동일하게 적용

bpe:
  num_merges: 10000              # BPE merge operation 횟수 (en+de 공동 학습)
  vocab_size: 16000              # 언어별 어휘집 크기 상한 (특수 토큰 포함)
  min_freq: 2                    # 어휘집 최소 서브워드 빈도
  codes_filename: codes.bpe      # data_dir 안에 저장될 BPE 코드 파일

checkpoint:
  save_dir: checkpoints
  resume_checkpoint: null        # 재개할 체크포인트 경로
  best_metric: loss              # loss | perplexity | token_accuracy | accuracy
  save_ensemble: true            # 학습 종료 시 최근 N개 체크포인트를 가중치 평균해 ensemble.pt 저장
  ensemble_last_n: 10            # 앙상블 평균에 사용할 최근 epoch 체크포인트 개수
  cleanup_epoch_checkpoints: true  # 종료 시 epoch_*.pt 전부 삭제 (last/best/ensemble은 보존)

inference:
  beam_size: 5
  max_length: 80                 # 생성 길이 절대 상한 (소스 비례 길이의 하드 캡)
  max_len_a: 1.2                 # fairseq 소스 비례 길이: int(a*src_len + b)
  max_len_b: 10                  # fairseq --max-len-b (상수 항)
  min_length: 1
  do_sample: false               # false -> 순수 greedy (beam_size == 1일 때)
  temperature: 1.0
  top_k: 0                       # 0이면 top-k 필터링 비활성화
  top_p: 1.0                     # 1.0이면 nucleus 필터링 비활성화
  repetition_penalty: 1.0
  length_penalty: 1.0            # GNMT 길이 정규화 지수

multimodal:                      # Multimodal MT (이미지 보강). use_image=false면 텍스트-only와 동일
  use_image: true                # 마스터 스위치 (false -> 기존 텍스트 Transformer)
  image_dir: data/image          # raw/ 이미지들과 split별 {split}.txt 리스트를 담는 루트
  image_encoder: vit             # vit | cnn (둘 다 scratch 구현, 교체 가능)
  image_size: 384                # 정사각 리사이즈 크기
  patch_size: 32                 # ViT patch 크기 (384/32 -> 144 patch tokens)
  image_channels: 3              # 입력 채널 (RGB)
  image_embed_dim: 128           # 이미지 인코더 내부 폭 (최종 d_model로 투영)
  image_layers: 4                # ViT 블록 수 (CNN은 residual 스테이지 수)
  image_heads: 4                 # ViT self-attention 헤드 (image_embed_dim 나눠떨어짐)
  image_ffn_dim: 256             # ViT feed-forward 은닉 폭
  fusion_type: sum              # sum | weighted | gate (모두 text + lam*image 형태)
  fusion_lambda: 0.5             # weighted 융합의 학습 가능한 λ 초기값 (image 비중)
  freeze_image_encoder: false    # true -> 이미지 인코더 동결 (기본: 번역 손실로 함께 학습)
  use_image_cache: true         # true -> preprocess_images.py로 만든 uint8 캐시(memmap)에서 로드
  image_cache_dir: data/data-bin/image  # 캐시 .npy 저장 위치 ({split}_{image_size}.npy)
